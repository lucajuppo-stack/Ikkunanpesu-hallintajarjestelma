{% extends "layout.html" %}

{% block content %}
<h2>Rekisteröidy</h2>
<form action="/register" method="POST">
    <label>Valitse käyttäjätunnus:</label>
    <input type="text" name="username" required>
    
    <label>Valitse salasana:</label>
    <input type="password" name="password" required>
    
    <button type="submit">Luo tunnus</button>
</form>

{% if error %}
    <p style="color: red;">{{ error }}</p>
{% endif %}

<p>Onko sinulla jo tunnus? <a href="/login">Kirjaudu tästä.</a></p>
{% endblock %}

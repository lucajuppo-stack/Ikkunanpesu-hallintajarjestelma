{% extends "layout.html" %}

{% block content %}
<h2>Lisää uusi tilaus</h2>

<form action="/new_order" method="POST">
    <label>Osoite:</label>
    <input type="text" name="address" required>

    <label>Ikkunoiden määrä:</label>
    <input type="number" name="window_count" required>

    <label>Hinta (€):</label>
    <input type="number" name="price" required>

    <label>Pesuajankohta:</label>
    <input type="date" name="wash_date" required>

    <label>Yhteystiedot:</label>
    <textarea name="contact_info" placeholder="Asiakkaan puhelin tai sähköposti" required></textarea>

    <label>Tyyppi:</label>
    {% if categories %}
        <select name="category" required>
            <option value="" disabled selected>Valitse tyyppi</option>
            {% for category in categories %}
                <option value="{{ category.id }}" {% if category.id in selected_categories %}selected{% endif %}>{{ category.name }}</option>
            {% endfor %}
        </select>
    {% else %}
        <p>Ei tyyppiä. Lisää tyyppi tietokantaan ensin.</p>
    {% endif %}

    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <button type="submit">Tallenna tilaus</button>
</form>

<p><a href="/">Peruuta ja palaa etusivulle</a></p>
{% endblock %}
